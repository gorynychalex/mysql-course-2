version: '3.8'

# ============================================================================
# Docker Compose для курса MySQL/MariaDB
# ============================================================================
# Использование:
#   docker-compose up -d           # Запуск
#   docker-compose down            # Остановка
#   docker-compose logs -f         # Просмотр логов
#   docker-compose exec mariadb bash # Вход в контейнер
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # MariaDB 10.11 LTS (основной)
  # --------------------------------------------------------------------------
  mariadb:
    image: mariadb:10.11
    container_name: mariadb-course-dev
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: library
      MARIADB_USER: librarian
      MARIADB_PASSWORD: librarian123
      MARIADB_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      # Сохранение данных
      - mariadb_data:/var/lib/mysql
      # Инициализационные скрипты (выполняются при первом запуске)
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      # Кастомная конфигурация
      - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - course-network
    labels:
      - "description=MariaDB 10.11 LTS для курса"

  # --------------------------------------------------------------------------
  # MySQL 8.0 (альтернатива - раскомментируйте при необходимости)
  # --------------------------------------------------------------------------
  # mysql:
  #   image: mysql:8.0
  #   container_name: mysql-course-dev
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpassword
  #     MYSQL_DATABASE: library
  #     MYSQL_USER: librarian
  #     MYSQL_PASSWORD: librarian123
  #     MYSQL_ROOT_HOST: '%'
  #   ports:
  #     - "3307:3306"  # Другой порт чтобы не конфликтовать с MariaDB
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./init-scripts:/docker-entrypoint-initdb.d:ro
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - course-network

  # --------------------------------------------------------------------------
  # Adminer - веб-интерфейс для управления БД (лёгкая альтернатива phpMyAdmin)
  # --------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: adminer-course-dev
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
      ADMINER_DESIGN: pepa-linha-dark
      ADMINER_SKIN: dark
    ports:
      - "8081:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - course-network
    labels:
      - "description=Adminer - веб-интерфейс для управления БД"

  # --------------------------------------------------------------------------
  # phpMyAdmin (альтернатива Adminer - раскомментируйте при необходимости)
  # --------------------------------------------------------------------------
  # phpmyadmin:
  #   image: phpmyadmin:latest
  #   container_name: phpmyadmin-course-dev
  #   restart: unless-stopped
  #   environment:
  #     PMA_HOST: mariadb
  #     PMA_PORT: 3306
  #     PMA_USER: root
  #     PMA_PASSWORD: rootpassword
  #     PMA_ABSOLUTE_URI: http://localhost:8080/
  #   ports:
  #     - "8080:80"
  #   depends_on:
  #     mariadb:
  #       condition: service_healthy
  #   networks:
  #     - course-network

# --------------------------------------------------------------------------
# Тома для хранения данных
# --------------------------------------------------------------------------
volumes:
  mariadb_data:
    driver: local
    labels:
      - "description=Данные MariaDB"
  # mysql_data:
  #   driver: local

# --------------------------------------------------------------------------
# Сети
# --------------------------------------------------------------------------
networks:
  course-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
