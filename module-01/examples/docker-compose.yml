version: '3.8'

# ============================================================================
# Docker Compose для курса MySQL
# ============================================================================
# Использование:
#   docker-compose up -d           # Запуск
#   docker-compose down            # Остановка
#   docker-compose logs -f         # Просмотр логов
#   docker-compose exec mysql bash # Вход в контейнер
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # MySQL 8.0
  # --------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: mysql-course-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: library
      MYSQL_USER: librarian
      MYSQL_PASSWORD: librarian123
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      # Сохранение данных
      - mysql_data:/var/lib/mysql
      # Инициализационные скрипты
      - ./init-scripts:/docker-entrypoint-initdb.d
      # Кастомная конфигурация
      - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - course-network
    labels:
      - "description=MySQL 8.0 для курса"

  # --------------------------------------------------------------------------
  # MariaDB 10.11 LTS (альтернатива)
  # --------------------------------------------------------------------------
  # Раскомментируйте для использования MariaDB вместо MySQL
  # mariadb:
  #   image: mariadb:10.11
  #   container_name: mariadb-course-dev
  #   restart: unless-stopped
  #   environment:
  #     MARIADB_ROOT_PASSWORD: rootpassword
  #     MARIADB_DATABASE: library
  #     MARIADB_USER: librarian
  #     MARIADB_PASSWORD: librarian123
  #     MARIADB_ROOT_HOST: '%'
  #   ports:
  #     - "3307:3306"  # Другой порт чтобы не конфликтовать с MySQL
  #   volumes:
  #     - mariadb_data:/var/lib/mysql
  #     - ./init-scripts:/docker-entrypoint-initdb.d
  #   healthcheck:
  #     test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   networks:
  #     - course-network

  # --------------------------------------------------------------------------
  # phpMyAdmin - веб-интерфейс для управления БД
  # --------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin-course-dev
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      PMA_ABSOLUTE_URI: http://localhost:8080/
      APACHE_PORT: 80
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - course-network
    labels:
      - "description=phpMyAdmin для управления БД"

  # --------------------------------------------------------------------------
  # Adminer - лёгкая альтернатива phpMyAdmin
  # --------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: adminer-course-dev
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha-dark
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - course-network
    labels:
      - "description=Adminer - лёгкий веб-интерфейс"

# --------------------------------------------------------------------------
# Тома для хранения данных
# --------------------------------------------------------------------------
volumes:
  mysql_data:
    driver: local
    labels:
      - "description=Данные MySQL"
  # mariadb_data:
  #   driver: local

# --------------------------------------------------------------------------
# Сети
# --------------------------------------------------------------------------
networks:
  course-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
